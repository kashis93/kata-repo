<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — AutoLot Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <header class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">AG</span>
        <span class="brand-text">AutoLot<br />Gallery</span>
      </a>

      <nav class="nav-links" id="navLinks">
        <a href="index.html">Inventory</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#financing">Financing</a>
        <a href="index.html#about">About Us</a>
        <a href="index.html#contact">Contact</a>
      </nav>

      <div class="navbar-actions" id="navbarActions">
        <a href="login.html" class="auth-link">Log In</a>
        <a href="signup.html" class="auth-link auth-link--divider" style="color: var(--coffee);">Sign Up</a>
        <a href="index.html" class="btn btn-primary btn-sm">View Showroom</a>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ============ SIGNUP SECTION ============ -->
  <main class="auth-section">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-badge">AG</div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join AutoLot Gallery for personalized VIP vehicle reservations</p>
      </div>

      <div id="authAlert" class="auth-alert" style="display: none;"></div>

      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="fullName" class="form-input" placeholder="Alexander Wright" required />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" class="form-input" placeholder="alexander@example.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" class="form-input" placeholder="Minimum 6 characters" minlength="6" required />
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter password" minlength="6" required />
          </div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <p class="auth-footer-note">
        Already have an account? <a href="login.html" class="form-link">Sign In</a>
      </p>
    </div>
  </main>

  <!-- ============ FOOTER ============ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="brand-mark">AG</span>
        <span class="brand-text">AutoLot Gallery</span>
      </div>
      <p class="footer-copy">&copy; 2026 AutoLot Gallery. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const form = document.getElementById('signupForm');
    const alertBox = document.getElementById('authAlert');
    const nameInput = document.getElementById('fullName');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(message, type = 'error') {
      alertBox.className = `auth-alert auth-alert--${type}`;
      alertBox.textContent = message;
      alertBox.style.display = 'flex';
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (password !== confirmPassword) {
        showAlert('Passwords do not match.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating Account...';

      const newUser = {
        id: Date.now(),
        name,
        email,
        role: 'customer'
      };

      localStorage.setItem('autolot_user', JSON.stringify(newUser));
      localStorage.setItem('autolot_token', 'token-' + Date.now());

      showAlert('Account successfully created! Redirecting to showroom...', 'success');

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1200);
    });

    // Mobile nav toggle
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    if (menuToggle && navLinks) {
      menuToggle.addEventListener('click', () => {
        navLinks.classList.toggle('open');
      });
    }
  </script>

</body>
</html>
