<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AutoLot Gallery — Curated Luxury Vehicles</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ============ NAVBAR ============ -->
<header class="navbar">
  <div class="navbar-inner">
    <a href="#" class="brand">
      <span class="brand-mark">AG</span>
      <span class="brand-text">AutoLot<br />Gallery</span>
    </a>

    <nav class="nav-links" id="navLinks">
          <a href="index.html">Inventory</a>
          <a href="#services">Services</a>
          <a href="#financing">Financing</a>
          <a href="#about">About Us</a>
          <a href="#contact">Contact</a>
        </nav>

        <div class="navbar-actions" id="navbarActions">
          <a href="login.html" class="auth-link">Log In</a>
          <a href="signup.html" class="auth-link auth-link--divider">Sign Up</a>
          <button class="btn btn-primary btn-sm" type="button">Book a Viewing</button>
          <button class="icon-btn" type="button" aria-label="Search">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.6"/><line x1="21" y1="21" x2="16.5" y2="16.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </button>
          <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
        </div>
  </div>
</header>

<!-- ============ HERO ============ -->
<section class="hero">
  <div class="hero-copy">
    <h1 class="hero-title">Experience<br />Curated Luxury.</h1>
    <p class="hero-sub">Discover our exclusive collection of premium vehicles, hand-selected for those who expect nothing less.</p>
    <button class="btn btn-primary">Browse Inventory</button>
  </div>

  <div class="hero-media">
    <img id="heroCar" class="hero-car" src="https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?auto=format&fit=crop&w=1600&q=80" alt="Featured luxury vehicle on a coastal mountain road" />
    <div class="hero-media-fade"></div>
  </div>
</section>

<!-- ============ SEARCH / FILTER BAR ============ -->
<section class="filter-bar" aria-label="Search inventory">
  <div class="filter-inner">
    <div class="filter-search">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.6"/><line x1="21" y1="21" x2="16.5" y2="16.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <input type="text" placeholder="Search Make, Model, or Year…" aria-label="Search Make, Model, or Year" />
    </div>

    <select class="filter-select" aria-label="Vehicle Type">
      <option>Vehicle Type</option>
      <option>Sedan</option>
      <option>SUV</option>
      <option>Coupe</option>
      <option>Convertible</option>
    </select>

    <select class="filter-select" aria-label="Make">
      <option>Make</option>
      <option>Porsche</option>
      <option>Audi</option>
      <option>BMW</option>
      <option>Land Rover</option>
      <option>Aston Martin</option>
    </select>

    <select class="filter-select" aria-label="Price Range">
      <option>Price Range</option>
      <option>Under €80,000</option>
      <option>€80,000 – €120,000</option>
      <option>€120,000+</option>
    </select>

    <select class="filter-select" aria-label="Model Year">
      <option>Model Year</option>
      <option>2024</option>
      <option>2023</option>
      <option>2022</option>
    </select>

    <button class="icon-btn icon-btn--ghost" type="button" aria-label="More filters">
      <svg viewBox="0 0 24 24" fill="none"><line x1="4" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="4" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="9" cy="7" r="1.8" fill="currentColor"/><circle cx="16" cy="12" r="1.8" fill="currentColor"/><circle cx="11" cy="17" r="1.8" fill="currentColor"/></svg>
    </button>

    <button class="icon-btn icon-btn--primary" type="button" aria-label="Search inventory">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.6"/><line x1="21" y1="21" x2="16.5" y2="16.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
  </div>
</section>

<!-- ============ VEHICLE GRID ============ -->
<section class="inventory" id="inventory">
  <div class="inventory-grid" id="vehicleGrid"></div>
</section>

<!-- ============ FOOTER ============ -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="brand-mark">AG</span>
      <span class="brand-text">AutoLot<br />Gallery</span>
    </div>
    <p class="footer-copy">© 2026 AutoLot Gallery. All rights reserved.</p>
  </div>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
